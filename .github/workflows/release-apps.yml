name: Release Apps

'on':
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, for example v0.1.0
        required: true
        type: string
      upload_to_release:
        description: Upload artifacts to the GitHub Release
        required: true
        default: false
        type: boolean
      clobber_assets:
        description: Replace existing release assets with the same names
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-apps-${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  metadata:
    name: Release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      should_upload: ${{ steps.meta.outputs.should_upload }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          fetch-depth: 0
          submodules: recursive

      - name: Resolve release metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_UPLOAD: ${{ inputs.upload_to_release }}
        run: |
          set -euo pipefail

          tag="${EVENT_TAG:-${INPUT_TAG:-}}"
          if [[ -z "${tag}" ]]; then
            echo "release tag is required" >&2
            exit 1
          fi

          version="${tag#v}"
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          if [[ -z "${cargo_version}" ]]; then
            echo "failed to read workspace version from Cargo.toml" >&2
            exit 1
          fi
          if [[ "${version}" != "${cargo_version}" ]]; then
            echo "tag ${tag} does not match workspace version ${cargo_version}" >&2
            exit 1
          fi

          should_upload=false
          if [[ "${EVENT_NAME}" == "release" || "${INPUT_UPLOAD}" == "true" ]]; then
            should_upload=true
          fi

          {
            echo "tag=${tag}"
            echo "version=${version}"
            echo "should_upload=${should_upload}"
          } >> "${GITHUB_OUTPUT}"

  build-windows:
    name: Build Windows x64
    runs-on: windows-2025
    needs: metadata
    env:
      BMZ_VERSION: ${{ needs.metadata.outputs.version }}
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_ROOT: C:\vcpkg
      VCPKGRS_DYNAMIC: 1
      LIBCLANG_PATH: C:\Program Files\LLVM\bin
      GAMEINPUT_VERSION: 3.4.218
      GAMEINPUT_PACKAGE_SHA256: 7F33C11D81D0286F649B4238877A94D116C19767713EF5D0E2DDC542CC411C26
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.metadata.outputs.tag }}
          fetch-depth: 0
          submodules: recursive

      - name: Show Rust toolchain
        shell: pwsh
        run: |
          rustup show
          rustc -Vv
          cargo -V

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-windows-x64-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            release-windows-x64-

      - name: Install cargo-about
        shell: pwsh
        run: cargo install --locked --features cli cargo-about

      - name: Install Windows packaging dependencies
        shell: pwsh
        run: |
          choco install innosetup --no-progress --yes

          if (-not (Test-Path -LiteralPath (Join-Path $env:VCPKG_ROOT "vcpkg.exe"))) {
            git clone https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
            & (Join-Path $env:VCPKG_ROOT "bootstrap-vcpkg.bat") -disableMetrics
          }

          & (Join-Path $env:VCPKG_ROOT "vcpkg.exe") install ffmpeg:x64-windows

      - name: Download Microsoft GameInput redistributable
        shell: pwsh
        run: |
          $root = Join-Path $PWD "dist\gameinput"
          $package = Join-Path $root "Microsoft.GameInput.$env:GAMEINPUT_VERSION.nupkg"
          $packageRoot = Join-Path $root "package"
          New-Item -ItemType Directory -Force -Path $root | Out-Null
          Invoke-WebRequest `
            -Uri "https://www.nuget.org/api/v2/package/Microsoft.GameInput/$env:GAMEINPUT_VERSION" `
            -OutFile $package

          $actualHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $package).Hash
          if ($actualHash -ne $env:GAMEINPUT_PACKAGE_SHA256) {
            throw "Microsoft.GameInput package SHA256 mismatch: $actualHash"
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::ExtractToDirectory($package, $packageRoot)
          if (-not (Test-Path -LiteralPath (Join-Path $packageRoot "redist\GameInputRedist.msi") -PathType Leaf)) {
            throw "GameInputRedist.msi was not found in Microsoft.GameInput package"
          }
          "BMZ_GAMEINPUT_PACKAGE_DIR=$packageRoot" | Out-File -LiteralPath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Record Windows dependency provenance
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\release | Out-Null

          $provenance = "dist\release\bmz-player-v$env:BMZ_VERSION-windows-x64-provenance.txt"
          "BMZ Player $env:BMZ_VERSION Windows x64 dependency provenance" | Out-File -LiteralPath $provenance -Encoding utf8
          "" | Out-File -LiteralPath $provenance -Encoding utf8 -Append
          "vcpkg packages:" | Out-File -LiteralPath $provenance -Encoding utf8 -Append
          & (Join-Path $env:VCPKG_ROOT "vcpkg.exe") list ffmpeg | Out-File -LiteralPath $provenance -Encoding utf8 -Append

          $ffmpegExe = Get-ChildItem -LiteralPath $env:VCPKG_ROOT -Filter ffmpeg.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($ffmpegExe) {
            "" | Out-File -LiteralPath $provenance -Encoding utf8 -Append
            "ffmpeg -version:" | Out-File -LiteralPath $provenance -Encoding utf8 -Append
            & $ffmpegExe.FullName -version | Out-File -LiteralPath $provenance -Encoding utf8 -Append
            if (Select-String -LiteralPath $provenance -Pattern "--enable-nonfree" -Quiet) {
              throw "FFmpeg was built with --enable-nonfree and must not be redistributed"
            }
          } else {
            "" | Out-File -LiteralPath $provenance -Encoding utf8 -Append
            "ffmpeg.exe was not present in vcpkg; package version was recorded from vcpkg list." | Out-File -LiteralPath $provenance -Encoding utf8 -Append
          }
          "" | Out-File -LiteralPath $provenance -Encoding utf8 -Append
          "Microsoft.GameInput NuGet: $env:GAMEINPUT_VERSION" | Out-File -LiteralPath $provenance -Encoding utf8 -Append
          "Microsoft.GameInput package SHA256: $env:GAMEINPUT_PACKAGE_SHA256" | Out-File -LiteralPath $provenance -Encoding utf8 -Append

      - name: Package Windows app
        shell: pwsh
        run: |
          .\scripts\package-windows.ps1 `
            -Installer `
            -GameInputPackageDir $env:BMZ_GAMEINPUT_PACKAGE_DIR `
            -DllDir (Join-Path $env:VCPKG_ROOT "installed\x64-windows\bin")

      - name: Verify packaged executable
        shell: pwsh
        run: |
          & "dist\windows\BMZ Player\bmz-player.exe" --help

      - name: Create Windows release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\release | Out-Null

          $portable = "dist\release\bmz-player-v$env:BMZ_VERSION-windows-x64-portable.zip"
          Compress-Archive -Path "dist\windows\BMZ Player" -DestinationPath $portable -Force

          $installer = "dist\windows\installer\bmz-player-$env:BMZ_VERSION-windows-x64-setup.exe"
          if (-not (Test-Path -LiteralPath $installer -PathType Leaf)) {
            throw "missing installer: $installer"
          }
          Copy-Item -LiteralPath $installer -Destination "dist\release\bmz-player-v$env:BMZ_VERSION-windows-x64-setup.exe" -Force

          Get-ChildItem -LiteralPath dist\release

      - name: Upload Windows release files
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-x64
          path: dist/release/*
          if-no-files-found: error
          retention-days: 14

  build-macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            arch: arm64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            arch: x64
    env:
      BMZ_VERSION: ${{ needs.metadata.outputs.version }}
      BMZ_MACOS_ARCH: ${{ matrix.arch }}
      BMZ_MACOS_CODESIGN_IDENTITY: ${{ secrets.BMZ_MACOS_CODESIGN_IDENTITY }}
      BMZ_MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.BMZ_MACOS_CERTIFICATE_P12_BASE64 }}
      BMZ_MACOS_CERTIFICATE_PASSWORD: ${{ secrets.BMZ_MACOS_CERTIFICATE_PASSWORD }}
      BMZ_MACOS_KEYCHAIN_PASSWORD: ${{ secrets.BMZ_MACOS_KEYCHAIN_PASSWORD }}
      BMZ_MACOS_NOTARY_APPLE_ID: ${{ secrets.BMZ_MACOS_NOTARY_APPLE_ID }}
      BMZ_MACOS_NOTARY_PASSWORD: ${{ secrets.BMZ_MACOS_NOTARY_PASSWORD }}
      BMZ_MACOS_NOTARY_TEAM_ID: ${{ secrets.BMZ_MACOS_NOTARY_TEAM_ID }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.metadata.outputs.tag }}
          fetch-depth: 0
          submodules: recursive

      - name: Show Rust toolchain
        run: |
          rustup show
          rustc -Vv
          cargo -V

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-macos-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            release-macos-${{ matrix.target }}-

      - name: Install cargo-about
        run: cargo install --locked --features cli cargo-about

      - name: Install macOS dependencies
        run: |
          brew install ffmpeg pkg-config
          FFMPEG_PREFIX="$(brew --prefix ffmpeg)"
          {
            echo "FFMPEG_DIR=${FFMPEG_PREFIX}"
            echo "PKG_CONFIG_PATH=${FFMPEG_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          } >> "${GITHUB_ENV}"
          rustup target add "${{ matrix.target }}"
          cargo clean -p ffmpeg-sys-next --target "${{ matrix.target }}"

      - name: Import macOS signing certificate
        run: |
          {
            echo "BMZ_MACOS_SIGNING_READY=0"
            echo "BMZ_MACOS_NOTARIZATION_READY=0"
          } >> "${GITHUB_ENV}"

          if [[ -z "${BMZ_MACOS_CODESIGN_IDENTITY}" || -z "${BMZ_MACOS_CERTIFICATE_P12_BASE64}" || -z "${BMZ_MACOS_CERTIFICATE_PASSWORD}" || -z "${BMZ_MACOS_KEYCHAIN_PASSWORD}" ]]; then
            echo "Developer ID signing secrets are not configured; using ad-hoc signing."
            exit 0
          fi

          certificate_path="${RUNNER_TEMP}/bmz-macos-codesign.p12"
          keychain_path="${RUNNER_TEMP}/bmz-macos-codesign.keychain-db"
          printf '%s' "${BMZ_MACOS_CERTIFICATE_P12_BASE64}" | base64 -D > "${certificate_path}"

          security create-keychain -p "${BMZ_MACOS_KEYCHAIN_PASSWORD}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${BMZ_MACOS_KEYCHAIN_PASSWORD}" "${keychain_path}"
          security import "${certificate_path}" \
            -P "${BMZ_MACOS_CERTIFICATE_PASSWORD}" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "${keychain_path}"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "${BMZ_MACOS_KEYCHAIN_PASSWORD}" \
            "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}" $(security list-keychains -d user | tr -d '"')

          {
            echo "BMZ_MACOS_SIGNING_READY=1"
            echo "BMZ_MACOS_KEYCHAIN_PATH=${keychain_path}"
          } >> "${GITHUB_ENV}"

          if [[ -n "${BMZ_MACOS_NOTARY_APPLE_ID}" && -n "${BMZ_MACOS_NOTARY_PASSWORD}" && -n "${BMZ_MACOS_NOTARY_TEAM_ID}" ]]; then
            echo "BMZ_MACOS_NOTARIZATION_READY=1" >> "${GITHUB_ENV}"
          else
            echo "Notarization secrets are not configured; the app will be signed but not notarized."
          fi

      - name: Record macOS dependency provenance
        run: |
          mkdir -p dist/release

          brew info --json=v2 ffmpeg > "dist/release/bmz-player-v${BMZ_VERSION}-macos-${BMZ_MACOS_ARCH}-brew-ffmpeg.json"
          ffmpeg -version > "dist/release/bmz-player-v${BMZ_VERSION}-macos-${BMZ_MACOS_ARCH}-ffmpeg-version.txt"
          if grep -q -- "--enable-nonfree" "dist/release/bmz-player-v${BMZ_VERSION}-macos-${BMZ_MACOS_ARCH}-ffmpeg-version.txt"; then
            echo "FFmpeg was built with --enable-nonfree and must not be redistributed" >&2
            exit 1
          fi

      - name: Package macOS app
        run: |
          sign_args=(--ad-hoc-sign)
          if [[ "${BMZ_MACOS_SIGNING_READY}" == "1" ]]; then
            sign_args=(--sign "${BMZ_MACOS_CODESIGN_IDENTITY}")
          fi

          scripts/package-macos-app.sh \
            --target "${{ matrix.target }}" \
            --bundle-dylibs \
            "${sign_args[@]}"

      - name: Verify packaged executable
        run: |
          "dist/macos/BMZ Player.app/Contents/MacOS/bmz-player" --help

      - name: Notarize macOS app
        run: |
          if [[ "${BMZ_MACOS_NOTARIZATION_READY}" != "1" ]]; then
            echo "Notarization secrets are not configured; skipping notarization."
            exit 0
          fi

          notary_zip="${RUNNER_TEMP}/bmz-player-${BMZ_VERSION}-macos-${BMZ_MACOS_ARCH}-notary.zip"
          ditto -c -k --keepParent "dist/macos/BMZ Player.app" "${notary_zip}"
          xcrun notarytool submit "${notary_zip}" \
            --apple-id "${BMZ_MACOS_NOTARY_APPLE_ID}" \
            --password "${BMZ_MACOS_NOTARY_PASSWORD}" \
            --team-id "${BMZ_MACOS_NOTARY_TEAM_ID}" \
            --wait
          xcrun stapler staple "dist/macos/BMZ Player.app"
          xcrun stapler validate "dist/macos/BMZ Player.app"
          spctl --assess --type execute --verbose=4 "dist/macos/BMZ Player.app"

      - name: Create macOS release files
        run: |
          mkdir -p dist/release
          ditto -c -k --keepParent \
            "dist/macos/BMZ Player.app" \
            "dist/release/bmz-player-v${BMZ_VERSION}-macos-${BMZ_MACOS_ARCH}.app.zip"
          ls -la dist/release

      - name: Upload macOS release files
        uses: actions/upload-artifact@v7
        with:
          name: release-macos-${{ matrix.arch }}
          path: dist/release/*
          if-no-files-found: error
          retention-days: 14

      - name: Delete macOS signing keychain
        if: always()
        run: |
          if [[ -n "${BMZ_MACOS_KEYCHAIN_PATH:-}" && -f "${BMZ_MACOS_KEYCHAIN_PATH}" ]]; then
            security delete-keychain "${BMZ_MACOS_KEYCHAIN_PATH}"
          fi

  build-flatpak:
    name: Build Linux Flatpak x64
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    needs: metadata
    env:
      BMZ_VERSION: ${{ needs.metadata.outputs.version }}
      BMZ_RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
      FLATPAK_APP_ID: net.hyrorre.BMZPlayer
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.metadata.outputs.tag }}
          fetch-depth: 0
          submodules: recursive

      - name: Prepare Flatpak container
        run: |
          if [ ! -s /etc/machine-id ]; then
            rm -f /etc/machine-id
            dbus-uuidgen --ensure=/etc/machine-id
          fi

          mkdir -p /var/lib/dbus

          if [ ! -s /var/lib/dbus/machine-id ]; then
            rm -f /var/lib/dbus/machine-id
            ln -s /etc/machine-id /var/lib/dbus/machine-id
          fi

          test -s /etc/machine-id
          test -s /var/lib/dbus/machine-id

      - name: Configure Flathub remote
        run: |
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Show Flatpak toolchain
        run: |
          flatpak --version
          flatpak-builder --version
          appstreamcli --version
          command -v desktop-file-validate
          command -v dbus-run-session

      - name: Cache Flatpak builder state
        uses: actions/cache@v5
        with:
          path: .flatpak-builder
          key: release-flatpak-x64-${{ hashFiles('Cargo.lock', 'installer/flatpak/net.hyrorre.BMZPlayer.yml', 'installer/flatpak/net.hyrorre.BMZPlayer.metainfo.xml') }}
          restore-keys: |
            release-flatpak-x64-

      - name: Sync Flatpak package metadata version
        run: |
          scripts/package-flatpak.sh --sync-metadata-only

      - name: Validate Flatpak metadata
        run: |
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          if [[ "${cargo_version}" != "${BMZ_VERSION}" ]]; then
            echo "Cargo.toml version ${cargo_version} does not match BMZ_VERSION ${BMZ_VERSION}" >&2
            exit 1
          fi
          if [[ "${BMZ_RELEASE_TAG}" != "v${BMZ_VERSION}" ]]; then
            echo "release tag ${BMZ_RELEASE_TAG} does not match BMZ_VERSION ${BMZ_VERSION}" >&2
            exit 1
          fi
          if ! grep -q "<release version=\"${BMZ_VERSION}\"" installer/flatpak/net.hyrorre.BMZPlayer.metainfo.xml; then
            echo "metainfo.xml does not contain release version ${BMZ_VERSION}" >&2
            exit 1
          fi
          first_release="$(sed -n 's/.*<release version="\([^"]*\)".*/\1/p' installer/flatpak/net.hyrorre.BMZPlayer.metainfo.xml | head -n 1)"
          if [[ "${first_release}" != "${BMZ_VERSION}" ]]; then
            echo "latest metainfo release ${first_release} does not match BMZ_VERSION ${BMZ_VERSION}" >&2
            exit 1
          fi
          desktop-file-validate installer/flatpak/net.hyrorre.BMZPlayer.desktop
          appstreamcli validate --no-net installer/flatpak/net.hyrorre.BMZPlayer.metainfo.xml
          flatpak-builder --show-deps installer/flatpak/net.hyrorre.BMZPlayer.yml

      - name: Record Flatpak dependency provenance
        run: |
          mkdir -p dist/release
          provenance="dist/release/bmz-player-v${BMZ_VERSION}-linux-x64-flatpak-provenance.txt"
          {
            echo "BMZ Player ${BMZ_VERSION} Linux x64 Flatpak dependency provenance"
            echo
            echo "Flatpak:"
            flatpak --version
            flatpak-builder --version
            echo
            echo "Manifest:"
            sed -n '1,220p' installer/flatpak/net.hyrorre.BMZPlayer.yml
          } > "${provenance}"

      - name: Package Flatpak app
        run: |
          dbus-run-session -- scripts/package-flatpak.sh

      - name: Verify Flatpak bundle
        run: |
          dbus-run-session -- bash -c '
            flatpak install --user -y "dist/flatpak/bmz-player-${BMZ_VERSION}-linux.flatpak"
            flatpak run "${FLATPAK_APP_ID}" --help
          '

      - name: Create Flatpak release files
        run: |
          mkdir -p dist/release
          src="dist/flatpak/bmz-player-${BMZ_VERSION}-linux.flatpak"
          dst="dist/release/bmz-player-v${BMZ_VERSION}-linux-x64.flatpak"
          if [[ ! -f "${src}" ]]; then
            echo "missing Flatpak bundle: ${src}" >&2
            exit 1
          fi
          cp "${src}" "${dst}"

          {
            echo
            echo "Flatpak installed refs after build:"
            dbus-run-session -- flatpak list --user
            echo
            echo "Installed app info:"
            dbus-run-session -- flatpak info --user "${FLATPAK_APP_ID}"
          } >> "dist/release/bmz-player-v${BMZ_VERSION}-linux-x64-flatpak-provenance.txt"

          ls -la dist/release

      - name: Upload Flatpak release files
        uses: actions/upload-artifact@v7
        with:
          name: release-linux-flatpak-x64
          path: dist/release/*
          if-no-files-found: error
          retention-days: 14

  attach-release-assets:
    name: Attach release assets
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build-windows
      - build-macos
      - build-flatpak
    if: needs.metadata.outputs.should_upload == 'true'
    permissions:
      contents: write
    steps:
      - name: Download release files
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist/release
          merge-multiple: true

      - name: Remove metadata sidecars from release upload
        run: |
          set -euo pipefail
          find dist/release -maxdepth 1 -type f \( -name "*.txt" -o -name "*.json" \) -print -delete

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd dist/release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload files to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          CLOBBER_ASSETS: ${{ inputs.clobber_assets }}
        run: |
          set -euo pipefail
          args=(release upload "${RELEASE_TAG}" dist/release/*)
          if [[ "${CLOBBER_ASSETS:-false}" == "true" ]]; then
            args+=(--clobber)
          fi
          gh "${args[@]}"
